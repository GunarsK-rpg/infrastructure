name: rpg

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.6.12
    container_name: rpg-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    command:
      # API
      - "--api.dashboard=true"
      - "--api.insecure=true"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=rpg_network"
      - "--providers.docker.constraints=Label(`traefik.constraint-rpg`,`true`)"
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
    ports:
      - "8100:80"
      - "8543:443"
      - "127.0.0.1:9003:8080"  # Traefik dashboard (localhost only)
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
      - type: bind
        source: ${TRAEFIK_CERT_DIR}/${TLS_CERT_FILE}
        target: /certs/cert.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${TRAEFIK_CERT_DIR}/${TLS_KEY_FILE}
        target: /certs/key.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/traefik/dynamic.yml
        target: /config/dynamic.yml
        read_only: true
    networks:
      - network
    depends_on:
      - public-web
      - public-api
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Database (PostgreSQL on port 5435)
  postgres:
    image: ghcr.io/gunarsk-portfolio/postgres-image:latest
    container_name: rpg-postgres
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,pg_cron"
      - "-c"
      - "cron.database_name=${POSTGRES_DB}"
    environment:
      # Must match cron.database_name in command above
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/docker/postgres/init-users.sh:/docker-entrypoint-initdb.d/01-init-users.sh:ro
      - ../database/docker/postgres/init-users.sql.template:/docker-entrypoint-initdb.d/init-users.sql.template:ro
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis Cache
  redis:
    image: redis:8-alpine
    container_name: rpg-redis
    restart: unless-stopped
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: >
      sh -c "redis-server /usr/local/etc/redis/redis.conf --requirepass '${REDIS_PASSWORD}'"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Database Migrations (Flyway)
  flyway:
    image: flyway/flyway:12
    container_name: rpg-flyway
    restart: "no"
    command: migrate
    volumes:
      - ../database/migrations:/flyway/sql
      - ../database/seeds:/flyway/seeds
      - type: bind
        source: ../database-seeds/global
        target: /flyway/seeds-global
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../database-seeds/stormlight
        target: /flyway/seeds-stormlight
        read_only: true
        bind:
          create_host_path: false
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:${DB_PORT}/${POSTGRES_DB}
      - FLYWAY_USER=${FLYWAY_USER}
      - FLYWAY_PASSWORD=${FLYWAY_PASSWORD}
      - FLYWAY_BASELINE_ON_MIGRATE=${FLYWAY_BASELINE_ON_MIGRATE}
      - FLYWAY_LOCATIONS=${FLYWAY_LOCATIONS}
    networks:
      - network
    depends_on:
      postgres:
        condition: service_healthy

  # Public API (Go backend)
  public-api:
    build:
      context: ../public-api
      dockerfile: Dockerfile
    container_name: rpg-public-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - PORT=${PUBLIC_API_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - LOG_SOURCE=${LOG_SOURCE}
      - ENVIRONMENT=${ENVIRONMENT}
      - GIN_MODE=${GIN_MODE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS_PUBLIC}
      - MAX_BODY_SIZE=${MAX_BODY_SIZE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${PUBLIC_API_PORT}:${PUBLIC_API_PORT}"
    networks:
      - network
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PUBLIC_API_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-rpg=true"
      # Rate limiting middleware
      - "traefik.http.middlewares.rpg-public-ratelimit.ratelimit.average=500"
      - "traefik.http.middlewares.rpg-public-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.rpg-public-ratelimit.ratelimit.burst=200"
      # HTTP router
      - "traefik.http.routers.rpg-public-api.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.rpg-public-api.entrypoints=web"
      - "traefik.http.routers.rpg-public-api.middlewares=rpg-public-ratelimit,security-headers@file"
      - "traefik.http.routers.rpg-public-api.priority=100"
      - "traefik.http.routers.rpg-public-api.service=rpg-public-api"
      # HTTPS router
      - "traefik.http.routers.rpg-public-api-secure.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.rpg-public-api-secure.entrypoints=websecure"
      - "traefik.http.routers.rpg-public-api-secure.middlewares=rpg-public-ratelimit,security-headers@file"
      - "traefik.http.routers.rpg-public-api-secure.priority=100"
      - "traefik.http.routers.rpg-public-api-secure.tls=true"
      - "traefik.http.routers.rpg-public-api-secure.service=rpg-public-api"
      - "traefik.http.services.rpg-public-api.loadbalancer.server.port=${PUBLIC_API_PORT}"

  # Public Web (Vue frontend)
  public-web:
    build:
      context: ../public-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_PUBLIC_API_URL}
        VITE_AUTH_URL: ${VITE_PUBLIC_AUTH_URL}
        VITE_FILES_API_URL: ${VITE_FILES_API_URL}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    container_name: rpg-public-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PUBLIC_WEB_PORT}:8080"
    networks:
      - network
    depends_on:
      public-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-rpg=true"
      # HTTP router
      - "traefik.http.routers.rpg-public-web.rule=PathPrefix(`/`) && !PathPrefix(`/api/`)"
      - "traefik.http.routers.rpg-public-web.entrypoints=web"
      - "traefik.http.routers.rpg-public-web.middlewares=security-headers@file"
      - "traefik.http.routers.rpg-public-web.priority=1"
      # HTTPS router
      - "traefik.http.routers.rpg-public-web-secure.rule=PathPrefix(`/`) && !PathPrefix(`/api/`)"
      - "traefik.http.routers.rpg-public-web-secure.entrypoints=websecure"
      - "traefik.http.routers.rpg-public-web-secure.middlewares=security-headers@file"
      - "traefik.http.routers.rpg-public-web-secure.priority=1"
      - "traefik.http.routers.rpg-public-web-secure.tls=true"
      - "traefik.http.routers.rpg-public-web-secure.service=rpg-public-web"
      - "traefik.http.services.rpg-public-web.loadbalancer.server.port=8080"

networks:
  network:
    name: rpg_network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
