# Redis configuration for Cosmere RPG

# Network
bind 0.0.0.0
port 6379

# Memory management
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence (AOF for durability)
appendonly yes
appendfsync everysec

# Security (password set via command line)
# requirepass is set via docker compose command

# Logging
loglevel notice
